---
- name: Deploy Trident, Trident Protect, and Storage on RKE2
  hosts: localhost
  gather_facts: false
  vars:
    cluster_name: "kcluster1"
    ontap_management_ip: "192.168.0.141"
    ontap_data_nasip: "192.168.0.146"
    svm_name: "trident_svm1"
    # Note: Pass kubeconfig and ONTAP credentials securely via AWX!

  tasks:
    # ----------------------------------------------------
    # 1. Add NetApp Helm Repositories
    # ----------------------------------------------------
    - name: Add NetApp Trident Helm Repository
      kubernetes.core.helm_repository:
        name: netapp-trident
        repo_url: https://netapp.github.io/trident-helm-chart

    - name: Add NetApp Trident Protect Helm Repository
      kubernetes.core.helm_repository:
        name: netapp-trident-protect
        repo_url: https://netapp.github.io/trident-protect-helm-chart

    # ----------------------------------------------------
    # 2. Install Trident (CSI Driver)
    # ----------------------------------------------------
    - name: Install NetApp Trident via Helm
      kubernetes.core.helm:
        name: trident
        chart_ref: netapp-trident/trident-operator
        release_namespace: trident
        create_namespace: true
        state: present
        wait: true

    # ----------------------------------------------------
    # 3. Install Trident protect (Data Management)
    # ----------------------------------------------------
    - name: Install Trident Protect CRDs
      kubernetes.core.helm:
        name: trident-protect-crds
        chart_ref: netapp-trident-protect/trident-protect-crds
        release_namespace: trident-protect
        create_namespace: true
        state: present

    - name: Install Trident Protect Operator
      kubernetes.core.helm:
        name: trident-protect
        chart_ref: netapp-trident-protect/trident-protect
        release_namespace: trident-protect
        state: present
        wait: true
        values:
          clusterName: "{{ cluster_name }}"

    # ----------------------------------------------------
    # 4. Configure the Storage Backends
    # ----------------------------------------------------
    - name: Create Secret for ONTAP Credentials
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: backend-ontap-credentials
            namespace: trident
          type: Opaque
          stringData:
            username: "{{ ontap_username }}"
            password: "{{ ontap_password }}"

    - name: Create TridentBackendConfig for ONTAP NAS
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: trident.netapp.io/v1
          kind: TridentBackendConfig
          metadata:
            name: backend-ontapsim1-nas
            namespace: trident
          spec:
            version: 1
            storageDriverName: ontap-nas
            svm: "{{ svm_name }}"
            managementLIF: "{{ ontap_management_ip }}"
            dataLIF: "{{ ontap_data_nasip }}"
            backendName: ontapsim1-backend-nas
            autoExportCIDRs: 
              - 192.168.0.0/24
            autoExportPolicy: true
            storagePrefix: trident_
            nfsMountOptions: "nfsvers=3,nolock"
            defaults:
              snapshotDir: "true"
              snapshotPolicy: "default-1weekly"
              snapshotReserve: "10"
            credentials:
              name: backend-ontap-credentials
    
    - name: Create TridentBackendConfig for ONTAP SAN
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: trident.netapp.io/v1
          kind: TridentBackendConfig
          metadata:
            name: backend-ontapsim1-san
            namespace: trident
          spec:
            version: 1
            storageDriverName: ontap-san
            sanType: "iscsi"
            svm: "{{ svm_name }}"
            managementLIF: "{{ ontap_management_ip }}"
            backendName: ontapsim1-backend-san
            igroupName: trident-rke2-igroup
            storagePrefix: trident_
            defaults:
              formatOptions: "-E nodiscard"
            credentials:
              name: backend-ontap-credentials

    # ---------------------------------------------------
    # 5. Create Kubernetes StorageClasses
    # ---------------------------------------------------
    - name: Create Trident StorageClass for NAS
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: ontapsim1-sc-nfs
          provisioner: csi.trident.netapp.io
          parameters:
            backendType: "ontap-nas"
            nasType: "nfs"
          allowVolumeExpansion: true
          volumeBindingMode: Immediate
          reclaimPolicy: Delete

    - name: Create Trident StorageClass for SAN
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: ontapsim1-sc-iscsi
          provisioner: csi.trident.netapp.io
          parameters:
            backendType: "ontap-san"
            fsType: "ext4"
          allowVolumeExpansion: true
          volumeBindingMode: WaitForFirstConsumer
          reclaimPolicy: Delete

    # ---------------------------------------------------
    # 6. Create Kubernetes VolumeSnapshotClass
    # ---------------------------------------------------
    - name: Create Trident VolumeSnaphotClass
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: snapshot.storage.k8s.io/v1
          kind: VolumeSnapshotClass
          metadata:
            name: csi-ontap-snapclass
            annotations: 
              snapshot.storage.kubernetes.io/is-default-class: "true"
          driver: csi.trident.netapp.io
          deletionPolicy: Delete
