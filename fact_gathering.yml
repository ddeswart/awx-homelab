---
- name: Automate Linux Fact Gathering
  hosts: all
  gather_facts: true  # Native gathering is active
  
  # Optimization settings for AWX execution
  any_errors_fatal: false
  ignore_unreachable: true

  tasks:
    - name: Ensure target host is actually a Linux system
      ansible.builtin.meta: end_host
      when: ansible_system != 'Linux'

    - name: Confirm successful fact population in AWX logs
      ansible.builtin.debug:
        msg: "Facts successfully updated for {{ ansible_hostname }} ({{ ansible_distribution }} {{ ansible_distribution_version }})"
