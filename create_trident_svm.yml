---
- name: Deploy and Configure NetApp ONTAP SVM for Kubernetes/Trident
  hosts: localhost
  gather_facts: false
    
  vars:
    # Cluster Connection details
    ontap_connection:
      hostname: "{{ ontap_hostname }}"
      username: "{{ ontap_username }}"
      password: "{{ ontap_password }}"
      https: true
      validate_certs: false

    # Architecture Config (Allows you to easily adjust ports or subnets)
    svm_name: "{{ svm_name }}"
    policy_name: "default"
    k8s_worker_subnet: "192.168.0.0/24"
    nfs_home_port: "e0b"
    iscsi_home_port_1: "e0b"
    iscsi_home_port_2: "e0c"

  # Map default connection details to ALL NetApp ONTAP modules in this playbook
  module_defaults:
    group/netapp.ontap.netapp_ontap: "{{ ontap_connection }}"

  tasks:
    # ----------------------------------------------------
    # 1. SVM Creation & Base Services
    # ----------------------------------------------------
    - name: Create SVM
      netapp.ontap.na_ontap_svm:
        state: present
        name: "{{ svm_name }}"
        comment: "Created with Ansible"
        ipspace: "Default"
        allowed_protocols:
          - nfs
          - iscsi
        ignore_rest_unsupported_options: true

    - name: Configure NFS Server
      netapp.ontap.na_ontap_nfs:
        state: present
        vserver: "{{ svm_name }}"
        nfsv3: enabled
        nfsv4: enabled
        nfsv41: enabled
        nfsv42: enabled

    - name: Enable iSCSI Service
      netapp.ontap.na_ontap_iscsi:
        state: present
        vserver: "{{ svm_name }}"
        service_state: started

    # ----------------------------------------------------
    # 2. Data Interfaces (LIFs)
    # ----------------------------------------------------
    - name: Create NFS Data LIF for Trident
      netapp.ontap.na_ontap_interface:
        state: present
        vserver: "{{ svm_name }}"
        interface_name: "{{ nfs_lif_name }}"
        home_node: "{{ ontap_node }}"
        home_port: "{{ nfs_home_port }}"
        role: data
        protocols: nfs
        address: "{{ nfs_lif_ip }}"
        netmask: "255.255.255.0"
        failover_policy: "broadcast-domain-wide"
        firewall_policy: "data"

    - name: Create 1st iSCSI Data LIF for Trident
      netapp.ontap.na_ontap_interface:
        state: present
        vserver: "{{ svm_name }}"
        interface_name: "{{ iscsi_lif_name1 }}"
        home_node: "{{ ontap_node }}"
        home_port: "{{ iscsi_home_port_1 }}"
        role: data
        protocols: iscsi
        address: "{{ iscsi_lif_ip1 }}"
        netmask: "255.255.255.0"
        failover_policy: "disabled"
        firewall_policy: "data"

    - name: Create 2nd iSCSI Data LIF for Trident
      netapp.ontap.na_ontap_interface:
        state: present
        vserver: "{{ svm_name }}"
        interface_name: "{{ iscsi_lif_name2 }}"
        home_node: "{{ ontap_node }}"
        home_port: "{{ iscsi_home_port_2 }}" # Assigned to different port for HA/MPIO path diversity
        role: data
        protocols: iscsi
        address: "{{ iscsi_lif_ip2 }}"
        netmask: "255.255.255.0"
        failover_policy: "disabled"
        firewall_policy: "data"

    # ----------------------------------------------------
    # 3. Export Policies (Security)
    # ----------------------------------------------------
    - name: Create Export Policy on SVM
      netapp.ontap.na_ontap_export_policy:
        state: present
        vserver: "{{ svm_name }}"
        name: "{{ policy_name }}"

    - name: Create Export Policy Rule for Kubernetes Subnet
      netapp.ontap.na_ontap_export_policy_rule:
        state: present
        vserver: "{{ svm_name }}"
        policy_name: "{{ policy_name }}"
        client_match: "{{ k8s_worker_subnet }}"
        ro_rule: sys
        rw_rule: sys
        super_user_security: sys
        protocol: nfs
        rule_index: 1
