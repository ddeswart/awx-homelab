---
- name: Create NetApp ONTAP SVM for Trident
  hosts: localhost
  gather_facts: false
  vars:
    ontap_connection:
      hostname: "{{ ontap_hostname }}"
      username: "{{ ontap_username }}"
      password: "{{ ontap_password }}"
      https: true
      validate_certs: false

  module_defaults:
    netapp.ontap.na_ontap_svm: "{{ ontap_connection }}"
  
  tasks:
    - name: Create SVM
      netapp.ontap.na_ontap_svm:
        state: present
        name: "{{ svm_name }}"
        comment: "Created with Ansible"
        ipspace: "Default"
        allowed_protocols:
          - nfs
          - iscsi
        ignore_rest_unsupported_options: true

- name: Configure NetApp ONTAP SVM Data LIFs
  hosts: localhost
  gather_facts: false
  vars:
    ontap_connection:
      hostname: "{{ ontap_hostname }}"
      username: "{{ ontap_username }}"
      password: "{{ ontap_password }}"
      https: true
      validate_certs: false

  module_defaults:
    netapp.ontap.na_ontap_interface: "{{ ontap_connection }}"

  tasks:
    # ----------------------------------------------------
    # 1. NFS Data LIF (IP-based, shared file storage)
    # ----------------------------------------------------
    - name: Create NFS Data LIF for Trident
      netapp.ontap.na_ontap_interface:
        state: present
        vserver: "{{ svm_name }}"
        interface_name: "{{ nfs_lif_name }}"
        home_node: "{{ ontap_node }}"
        home_port: "e0b"
        role: data
        protocols: nfs
        address: "{{ nfs_lif_ip }}"
        netmask: "255.255.255.0"
        failover_policy: "broadcast-domain-wide"
        firewall_policy: "data"

    # ----------------------------------------------------
    # 2. iSCSI Data LIFs (IP-based, block storage)
    # ----------------------------------------------------
    - name: Create 1st iSCSI Data LIF for Trident
      netapp.ontap.na_ontap_interface:
        state: present
        vserver: "{{ svm_name }}"
        interface_name: "{{ iscsi_lif_name1 }}"
        home_node: "{{ ontap_node }}"
        home_port: "e0c"
        role: data
        protocols: iscsi
        address: "{{ iscsi_lif_ip1 }}"
        netmask: "255.255.255.0"
        failover_policy: "disabled"
        firewall_policy: "data"

    # ----------------------------------------------------
    # 3. iSCSI Data LIF (IP-based, block storage)
    # ----------------------------------------------------
    - name: Create 2nd iSCSI Data LIF for Trident
      netapp.ontap.na_ontap_interface:
        state: present
        vserver: "{{ svm_name }}"
        interface_name: "{{ iscsi_lif_name2 }}"
        home_node: "{{ ontap_node }}"
        home_port: "e0c"
        role: data
        protocols: iscsi
        address: "{{ iscsi_lif_ip2 }}"
        netmask: "255.255.255.0"
        failover_policy: "disabled"
        firewall_policy: "data"

- name: Create NFS server on Trident SVM
  hosts: localhost
  gather_facts: false
  vars:
    ontap_connection:
      hostname: "{{ ontap_hostname }}"
      username: "{{ ontap_username }}"
      password: "{{ ontap_password }}"
      https: true
      validate_certs: false

  module_defaults:
    netapp.ontap.na_ontap_nfs: "{{ ontap_connection }}"

  tasks:
    - name: Configure NFS
      netapp.ontap.na_ontap_nfs:
        state: present
        vserver: "{{ svm_name }}"
        nfsv3: enabled
        nfsv4: disabled
        nfsv41: disabled

- name: Configure ONTAP Export Policy for Kubernetes Worker Nodes
  hosts: localhost
  gather_facts: false
  vars:
    ontap_connection:
      hostname: "{{ ontap_hostname }}"
      username: "{{ ontap_username }}"
      password: "{{ ontap_password }}"
      https: true
      validate_certs: false
    
    svm_name: "{{ svm_name }}"
    policy_name: "k8s_nodes_policy"
    k8s_worker_subnet: "192.168.0.0/24"

  module_defaults:
    netapp.ontap.na_ontap_export_policy: "{{ ontap_connection }}"
    netapp.ontap.na_ontap_export_policy_rule: "{{ ontap_connection }}"

  tasks:
    # ----------------------------------------------------
    # 1. Create the Export Policy Container
    # ----------------------------------------------------
    - name: Create Export Policy on SVM
      netapp.ontap.na_ontap_export_policy:
        state: present
        vserver: "{{ svm_name }}"
        name: "{{ policy_name }}"

    # ----------------------------------------------------
    # 2. Add Rule to Grant Kubernetes Workers Access
    # ----------------------------------------------------
    - name: Create Export Policy Rule for Kubernetes Subnet
      netapp.ontap.na_ontap_export_policy_rule:
        state: present
        vserver: "{{ svm_name }}"
        policy_name: "{{ policy_name }}"
        
        # Rule Specifics
        client_match: "{{ k8s_worker_subnet }}" # Matches the Kubernetes worker node IP block
        ro_rule: any                             # Read-Only access allowed via any protocol (sys, krb5, etc.)
        rw_rule: any                             # Read-Write access allowed via any protocol
        super_user_security: any                 # Allows 'root' on the K8s node to act as 'root' on the storage (required for many K8s apps)
        protocol: nfs                            # Limit this rule to NFS traffic
        
        # Rule Ordering
        rule_index: 1                            # Lower numbers execute first

- name: Create iSCSI service on Trident SVM
  hosts: localhost
  gather_facts: false
  vars:
    ontap_connection:
      hostname: "{{ ontap_hostname }}"
      username: "{{ ontap_username }}"
      password: "{{ ontap_password }}"
      https: true
      validate_certs: false

  module_defaults:
    netapp.ontap.na_ontap_iscsi: "{{ ontap_connection }}"

  tasks:
    - name: Enable iSCSI
      netapp.ontap.na_ontap_iscsi:
        state: present
        vserver: "{{ svm_name }}"
        service_state: started
